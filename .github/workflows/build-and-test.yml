name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    
    - name: Cache Derived Data
      uses: actions/cache@v4
      with:
        path: |
          ~/Library/Developer/Xcode/DerivedData
        key: ${{ runner.os }}-xcode-deriveddata-${{ hashFiles('**/*.xcodeproj') }}
        restore-keys: |
          ${{ runner.os }}-xcode-deriveddata-
    
    - name: Build App
      run: |
        xcodebuild clean build \
          -project JobTwister.xcodeproj \
          -scheme JobTwister \
          -destination 'platform=macOS' \
          -configuration Release \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          ONLY_ACTIVE_ARCH=NO
    
    - name: Run Unit Tests
      run: |
        xcodebuild test \
          -project JobTwister.xcodeproj \
          -scheme JobTwister \
          -destination 'platform=macOS' \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          ONLY_ACTIVE_ARCH=NO
    
    - name: Run UI Tests
      run: |
        xcodebuild test \
          -project JobTwister.xcodeproj \
          -scheme JobTwister \
          -destination 'platform=macOS' \
          -configuration Debug \
          -testPlan JobTwisterUITests \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          ONLY_ACTIVE_ARCH=NO
      continue-on-error: true  # UI tests might be flaky